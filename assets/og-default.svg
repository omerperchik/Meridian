<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#c8c1ad" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#f5f2ea"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- meridian mark -->
  <g transform="translate(80, 80)">
    <circle cx="40" cy="40" r="36" fill="none" stroke="#12110f" stroke-width="3"/>
    <line x1="40" y1="4" x2="40" y2="76" stroke="#12110f" stroke-width="2"/>
    <line x1="4" y1="40" x2="76" y2="40" stroke="#12110f" stroke-width="2"/>
    <circle cx="40" cy="40" r="8" fill="#a2332a"/>
  </g>
  <text x="180" y="135" font-family="Georgia, serif" font-size="42" font-weight="600" fill="#12110f" letter-spacing="-1">Meridian</text>

  <!-- coord -->
  <text x="1080" y="110" font-family="Menlo, monospace" font-size="14" fill="#5a564e" text-anchor="end">UAOP v1.0.0</text>
  <text x="1080" y="130" font-family="Menlo, monospace" font-size="14" fill="#a2332a" text-anchor="end">● LIVE</text>

  <!-- main -->
  <text x="80" y="340" font-family="Georgia, serif" font-size="84" font-weight="600" fill="#12110f" letter-spacing="-3">The operating</text>
  <text x="80" y="430" font-family="Georgia, serif" font-size="84" font-weight="600" fill="#12110f" letter-spacing="-3"><tspan fill="#a2332a" font-style="italic">standard</tspan> for AI agents.</text>

  <!-- subtitle -->
  <text x="80" y="520" font-family="Inter, sans-serif" font-size="22" fill="#2b2824">A neutral, cross-vendor behavioral standard, live trust score,</text>
  <text x="80" y="552" font-family="Inter, sans-serif" font-size="22" fill="#2b2824">threat feed, and public incident record for the agentic economy.</text>

  <!-- footer meta -->
  <line x1="80" y1="585" x2="1120" y2="585" stroke="#12110f" stroke-width="1"/>
  <text x="80" y="612" font-family="Menlo, monospace" font-size="12" fill="#5a564e" letter-spacing="1">MERIDIAN.AI · STANDARDS · DIRECTORY · THREATS · INCIDENTS · RULINGS</text>
</svg>

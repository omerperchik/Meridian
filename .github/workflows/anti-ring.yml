name: Anti-ring detection

on:
  schedule:
    # Nightly at 03:14 UTC
    - cron: "14 3 * * *"
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scoring/requirements.txt
      - run: pip install -r scoring/requirements.txt
      - run: python scoring/anti_ring.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

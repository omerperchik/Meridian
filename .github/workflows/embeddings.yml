name: Embedding generation

on:
  schedule:
    # Twice daily; embeddings only refresh when corpus changes
    - cron: "27 4,16 * * *"
  workflow_dispatch:

jobs:
  embed:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scoring/requirements.txt
      - run: pip install -r scoring/requirements.txt
      - run: python scoring/embeddings.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # If set, the worker uses OpenAI embeddings; otherwise falls back to
          # the deterministic hash-bag embedding — fine for bootstrap.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}

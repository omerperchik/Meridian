name: Scoring engine

on:
  schedule:
    # Every hour at :07
    - cron: "7 * * * *"
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scoring/requirements.txt
      - run: pip install -r scoring/requirements.txt
      - run: python scoring/engine.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

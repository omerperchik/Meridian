name: Arena runner

on:
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: arena/package-lock.json
      - run: npm install --omit=dev
        working-directory: arena
      - run: npm run start
        working-directory: arena
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
